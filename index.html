    <!-- Security Hardening Wave 1 — Content Security Policy (defense-in-depth)
         Política deliberadamente compatível com Supabase, Lovable AI Gateway,
         Browserless, fonts/images CDN, analytics e charts/canvas.
         - 'unsafe-inline' em style-src: necessário para Tailwind/Radix (CSS-in-JS runtime).
         - 'unsafe-inline' em script-src: necessário p/ Vite runtime + lovable-tagger em dev.
           Mantido em prod porque alguns vendors (Sentry/PWA) injetam tags.
         - frame-ancestors 'self' lovable.dev: bloqueia clickjacking, permite preview Lovable.
         - object-src 'none': bloqueia plugins legados.
         Ver .lovable/audit/security-hardening-wave-1.md para racional completo. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.lovable.dev https://*.lovable.app https://cdn.gpteng.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.lovable.dev https://*.lovable.app https://ai.gateway.lovable.dev https://chrome.browserless.io https://*.sentry.io https://o*.ingest.sentry.io https://storage.googleapis.com; worker-src 'self' blob:; frame-src 'self' https://*.lovable.dev https://*.lovable.app; frame-ancestors 'self' https://*.lovable.dev https://*.lovable.app; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <title>Simulador de Consórcio Inteligente</title>
